name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Generate Gradle Wrapper
      # Since we do not have gradlew in the repository, we generate it on-the-fly
      # using the runner's pre-installed gradle.
      run: |
        gradle wrapper --gradle-version 9.3.1
        chmod +x gradlew

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK for Release
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/PureText-${{ github.ref_name }}.apk

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PureText-Debug-APK
        path: app/build/outputs/apk/debug/*.apk

    - name: Create Release and Upload Assets
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/PureText-${{ github.ref_name }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
